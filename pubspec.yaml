name: i18n
description: Simple i18n solution for dart and flutter. Uses code generation to generate translations as dart classes. Efficient and works with autocomplete!
version: 4.2.4
homepage: https://github.com/MohiuddinM/i18n

environment:
  sdk: ^3.0.0

dependencies:
  build: ^4.0.6
  build_config: ^1.3.0
  dart_style: ^3.1.9
  yaml: ^3.1.3
  quick_log: ^5.5.3
  glob: ^2.1.3
  pub_semver: ^2.2.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
  build_runner: ^2.15.0
  build_web_compilers: ^4.6.0

